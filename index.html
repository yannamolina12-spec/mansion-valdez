<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackwood: El Legado de las Sombras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,600;1,400&family=Special+Elite&display=swap');

        :root {
            --bg-color: #020617;
            --accent: #fbbf24;
            --noir-dark: #0f172a;
        }

        /* Ajuste para móvil: Evitar scroll elástico y asegurar 100% de pantalla */
        body {
            background-color: var(--bg-color);
            color: #f1f5f9;
            font-family: 'Crimson Pro', serif;
            margin: 0;
            overflow: hidden;
            height: 100dvh; 
            user-select: none;
            touch-action: manipulation;
        }

        /* Lluvia ambiental */
        .rain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background: linear-gradient(to bottom, rgba(2,6,23,0.9), rgba(2,6,23,1));
        }

        .drop {
            position: absolute;
            background: rgba(255,255,255,0.15);
            width: 1px;
            height: 60px;
            top: -100px;
            animation: fall 0.7s linear infinite;
        }

        @keyframes fall { to { transform: translateY(110vh); } }

        /* Efecto de relámpago */
        .lightning-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 100;
            pointer-events: none;
        }

        .flash-active { animation: flashEffect 0.5s ease-out; }
        @keyframes flashEffect {
            0% { opacity: 0; }
            5% { opacity: 0.8; }
            15% { opacity: 0; }
            20% { opacity: 0.4; }
            100% { opacity: 0; }
        }

        /* Contenedor Adaptable */
        #game-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(51, 65, 85, 0.3);
            border-right: 1px solid rgba(51, 65, 85, 0.3);
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }

        .scene-transition {
            position: absolute;
            inset: 0;
            background: black;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .scene-transition.active { opacity: 1; }

        /* Área Visual con Personajes Animados */
        .visual-area {
            height: 38vh;
            background: radial-gradient(circle at center, #1e293b 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7rem;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid rgba(251, 191, 36, 0.1);
        }

        .character-sprite {
            position: relative;
            z-index: 5;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
        }

        /* Animación de Respiración (Reposo) */
        .idle-anim {
            animation: breathe 3.5s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            50% { transform: translateY(-12px) scale(1.03) rotate(1deg); }
        }

        /* Animación al Hablar */
        .talking-anim {
            animation: talk 0.15s infinite alternate;
        }

        @keyframes talk {
            0% { transform: scale(1.05) rotate(-1deg); }
            100% { transform: scale(1.05) rotate(1deg); }
        }

        .visual-overlay {
            position: absolute;
            bottom: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(15, 23, 42, 1) 5%, transparent 70%);
        }

        /* Botones para móviles */
        .choice-btn {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 1) 100%);
            border: 1px solid #334155;
            padding: 1.2rem;
            text-align: left;
            border-radius: 1rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 15px;
            color: #cbd5e1;
            font-size: 1.05rem;
            min-height: 65px;
            -webkit-tap-highlight-color: transparent;
        }

        .choice-btn:active {
            background: var(--accent);
            color: black;
            transform: scale(0.96);
            border-color: #fff;
        }

        /* Puzles */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 280px; margin: 10px auto; }
        .key {
            background: #1e293b;
            padding: 18px;
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
            border: 1px solid #475569;
            font-weight: bold;
            font-family: 'Special Elite', cursive;
            font-size: 1.2rem;
        }
        .key:active { background: var(--accent); color: black; transform: translateY(2px); }

        .inv-slot {
            width: 42px; height: 42px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #334155;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .inv-filled {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(3px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-5px, 0, 0); }
            40%, 60% { transform: translate3d(5px, 0, 0); }
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="lightning-flash" id="flash"></div>
    <div class="rain" id="rain-layer"></div>
    <div class="scene-transition" id="transition-curtain"></div>

    <div id="game-container">
        <!-- Header con Inventario -->
        <header class="p-4 flex justify-between items-center border-b border-slate-800 bg-black/50">
            <div>
                <h1 class="text-[9px] uppercase tracking-[0.5em] text-slate-500 font-black">Investigación Blackwood</h1>
                <p id="location-name" class="text-xs font-bold text-amber-500 tracking-widest uppercase">Cargando...</p>
            </div>
            <div id="inventory" class="flex gap-2"></div>
        </header>

        <!-- Pantalla de Personaje Animado -->
        <div class="visual-area">
            <div id="visual-character" class="character-sprite idle-anim">🏰</div>
            <div class="visual-overlay"></div>
        </div>

        <!-- Caja de Texto -->
        <div class="flex-grow p-6 overflow-y-auto" id="text-scroll">
            <div id="story-box" class="space-y-5">
                <div id="main-text" class="text-xl leading-relaxed text-slate-100 font-light min-h-[100px]"></div>
                <div id="puzzle-area" class="hidden bg-slate-900/90 p-5 rounded-2xl border border-slate-700 shadow-2xl">
                    <!-- Contenido dinámico del puzle -->
                </div>
            </div>
        </div>

        <!-- Botonera -->
        <div id="choices-container" class="p-5 grid gap-3.5 border-t border-slate-800 bg-slate-950/95">
            <!-- Botones inyectados por JS -->
        </div>

        <div class="p-2 text-[9px] uppercase tracking-[0.2em] text-center text-slate-700 bg-black">
            System Online • Multi-Touch Enabled • V.4.5
        </div>
    </div>

<script>
    const state = {
        location: 'inicio',
        inventory: new Set(),
        flags: {
            powerOn: false,
            readClue: false
        },
        puzzleInput: "",
        isTyping: false
    };

    const scenes = {
        inicio: {
            name: "Entrada de la Mansión",
            character: "🏰",
            text: "Te detienes ante las imponentes puertas de roble. El frío cala tus huesos. Un panel de fusibles vibra ruidosamente cerca de la entrada. Necesitas luz para avanzar.",
            choices: [
                { text: "Reparar Electricidad", target: "puzle_energia", icon: "⚡" },
                { text: "Subir a la Biblioteca", target: "biblioteca", icon: "📚" },
                { text: "Entrar a la Cocina", target: "cocina", icon: "🍳" }
            ]
        },
        puzle_energia: {
            name: "Caja de Alta Tensión",
            character: "🔌",
            text: "El panel chisporrotea. Tienes que reordenar el flujo. La secuencia es de mayor a menor frecuencia visual: Azul (Alto), Amarillo (Medio), Rojo (Bajo).",
            isPuzzle: "sequence",
            sequence: ["Azul", "Amarillo", "Rojo"],
            onSolve: () => {
                state.flags.powerOn = true;
                triggerLightning();
            },
            choices: [{ text: "Regresar", target: "inicio", icon: "⬅️" }]
        },
        biblioteca: {
            name: "La Biblioteca Real",
            character: "📖",
            text: "Cientos de ojos parecen observarte desde los lomos de los libros. Con la luz encendida, un mensaje en el polvo del escritorio es visible: 'La clave está en la fecha: 04-12'.",
            onEnter: () => state.flags.readClue = true,
            choices: [
                { text: "Bajar a la Entrada", target: "inicio", icon: "⬅️" },
                { text: "Forzar el Escritorio", target: "puzle_escritorio", icon: "🔐" }
            ]
        },
        puzle_escritorio: {
            name: "Cierre Electrónico",
            character: "🗄️",
            text: "Un teclado táctil bloquea el cajón. Introduce los 4 dígitos de la tragedia.",
            isPuzzle: "keypad",
            solution: "0412",
            onSolve: () => addItem("Daga de Plata"),
            choices: [{ text: "Atrás", target: "biblioteca", icon: "⬅️" }]
        },
        cocina: {
            name: "Cocina de Mansión",
            character: "👨‍💼", // El Mayordomo
            text: "Un hombre de mirada gélida corta verduras con precisión quirúrgica. 'Detective... no esperaba que llegara tan lejos'.",
            choices: [
                { text: "Confrontar al Mayordomo", target: "climax", icon: "🕵️" },
                { text: "Salir corriendo", target: "inicio", icon: "⬅️" }
            ]
        },
        climax: {
            name: "Duelo Final",
            character: "😠", 
            text: "El mayordomo suelta el cuchillo. 'Su curiosidad será su tumba'. Se abalanza sobre ti en la penumbra.",
            condition: () => state.inventory.has("Daga de Plata") && state.flags.readClue,
            targetIfTrue: "victoria",
            choices: [{ text: "¡Socorro!", target: "derrota", icon: "💀" }]
        },
        victoria: {
            name: "Caso Resuelto",
            character: "👮",
            text: "Usas la Daga para defenderte y revelas que sabes lo del 04 de Diciembre. El criminal confiesa todo antes de que llegue la policía. ¡Eres un héroe!",
            choices: [{ text: "Nueva Partida", target: "inicio", isReset: true, icon: "🔄" }]
        },
        derrota: {
            name: "Fin del Juego",
            character: "⚰️",
            text: "Sin pruebas ni defensa, te conviertes en una víctima más de la maldición de los Blackwood.",
            choices: [{ text: "Reintentar", target: "inicio", isReset: true, icon: "🔄" }]
        }
    };

    function typeWriter(text, element) {
        state.isTyping = true;
        element.textContent = "";
        const char = document.getElementById('visual-character');
        char.classList.remove('idle-anim');
        char.classList.add('talking-anim');

        let i = 0;
        function step() {
            if (i < text.length) {
                element.textContent += text.charAt(i);
                i++;
                setTimeout(step, 20);
            } else {
                state.isTyping = false;
                char.classList.remove('talking-anim');
                char.classList.add('idle-anim');
            }
        }
        step();
    }

    function triggerLightning() {
        const flash = document.getElementById('flash');
        flash.classList.add('flash-active');
        setTimeout(() => flash.classList.remove('flash-active'), 500);
        document.getElementById('game-container').classList.add('shake');
        setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
    }

    async function changeScene(target) {
        const curtain = document.getElementById('transition-curtain');
        curtain.classList.add('active');
        await new Promise(r => setTimeout(r, 450));
        
        state.location = target;
        if (scenes[target].onEnter) scenes[target].onEnter();
        render();
        
        curtain.classList.remove('active');
    }

    function render() {
        const scene = scenes[state.location];
        document.getElementById('location-name').textContent = scene.name;
        document.getElementById('visual-character').textContent = scene.character;
        
        const mainText = document.getElementById('main-text');
        typeWriter(scene.text, mainText);

        const pArea = document.getElementById('puzzle-area');
        pArea.innerHTML = "";
        pArea.classList.add('hidden');

        // Lógica de Puzle de Secuencia
        if (scene.isPuzzle === "sequence" && !state.flags.powerOn) {
            pArea.classList.remove('hidden');
            const colors = ["Azul", "Amarillo", "Rojo"];
            pArea.innerHTML = `<p class="text-[11px] text-amber-500 mb-4 text-center font-black uppercase">Frecuencia de Red: Azul > Amar > Rojo</p>`;
            colors.forEach(c => {
                const b = document.createElement('button');
                b.className = "w-full p-4 mb-3 rounded-xl bg-slate-800 border-2 border-slate-700 font-bold text-slate-300 active:bg-amber-500 active:text-black transition-colors";
                b.textContent = `Fusible ${c}`;
                b.onclick = () => {
                    if (c === scene.sequence[state.puzzleInput.length]) {
                        state.puzzleInput += "X";
                        b.style.borderColor = "#fbbf24";
                        if (state.puzzleInput.length === 3) {
                            scene.onSolve();
                            state.puzzleInput = "";
                            alert("¡POTENCIA RESTABLECIDA!");
                            render();
                        }
                    } else {
                        state.puzzleInput = "";
                        triggerLightning();
                        render();
                    }
                };
                pArea.appendChild(b);
            });
        }

        // Lógica de Teclado
        if (scene.isPuzzle === "keypad") {
            pArea.classList.remove('hidden');
            renderKeypad(scene);
        }

        // Renderizar Botones
        const container = document.getElementById('choices-container');
        container.innerHTML = "";
        
        let currentChoices = scene.choices;
        if (scene.targetIfTrue && scene.condition()) {
            currentChoices = [{ text: "¡Revelar Pruebas!", target: scene.targetIfTrue, icon: "⚔️" }];
        }

        currentChoices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.innerHTML = `<span>${c.icon}</span> <span>${c.text}</span>`;
            btn.onclick = () => {
                if (state.isTyping) return;
                if (c.isReset) resetGame();
                changeScene(c.target);
            };
            container.appendChild(btn);
        });

        updateInventory();
    }

    function renderKeypad(scene) {
        const pArea = document.getElementById('puzzle-area');
        pArea.innerHTML = `
            <div class="text-center font-mono text-3xl mb-4 p-3 bg-black text-amber-500 border-2 border-amber-900 rounded-xl shadow-inner">
                ${state.puzzleInput.padEnd(4, '•')}
            </div>
            <div class="keypad">
                ${[1,2,3,4,5,6,7,8,9,'C',0,'OK'].map(k => `
                    <div class="key" onclick="handleKey('${k}', '${scene.solution}')">${k}</div>
                `).join('')}
            </div>
        `;
    }

    window.handleKey = (k, sol) => {
        if (k === 'C') state.puzzleInput = "";
        else if (k === 'OK') {
            if (state.puzzleInput === sol) {
                scenes[state.location].onSolve();
                alert("Mecanismo abierto.");
                state.puzzleInput = "";
                changeScene("biblioteca");
            } else {
                state.puzzleInput = "";
                triggerLightning();
            }
        } else if (state.puzzleInput.length < 4) {
            state.puzzleInput += k;
        }
        render();
    };

    function addItem(it) {
        state.inventory.add(it);
        updateInventory();
    }

    function updateInventory() {
        const inv = document.getElementById('inventory');
        inv.innerHTML = "";
        for (let i = 0; i < 2; i++) {
            const slot = document.createElement('div');
            slot.className = "inv-slot";
            const items = Array.from(state.inventory);
            if (items[i]) {
                slot.innerHTML = items[i] === "Daga de Plata" ? "🗡️" : "❓";
                slot.classList.add('inv-filled');
            }
            inv.appendChild(slot);
        }
    }

    function resetGame() {
        state.inventory = new Set();
        state.flags = { powerOn: false, readClue: false };
        state.puzzleInput = "";
    }

    function initRain() {
        const layer = document.getElementById('rain-layer');
        for (let i = 0; i < 45; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (0.5 + Math.random() * 0.3) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            layer.appendChild(drop);
        }
    }

    window.onload = () => {
        initRain();
        render();
        // Relámpagos aleatorios
        setInterval(() => { if (Math.random() > 0.97) triggerLightning(); }, 4000);
    };
</script>
</body>
</html>
