<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mansión Embrujada - Misterio Interactivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- Canvas para el juego -->
        <canvas id="gameCanvas" width="1200" height="700"></canvas>
        
        <!-- Interfaz del juego -->
        <div class="ui">
            <div class="inventory">
                <h3>Inventario</h3>
                <div id="inventoryItems"></div>
            </div>
            <div class="dialogue">
                <div id="dialogueText"></div>
                <div id="dialogueOptions"></div>
            </div>
            <div class="status">
                <div>Pista: <span id="hint"></span></div>
                <div>Progreso: <span id="progress">0/5</span></div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="assets/audio/mystery-bg.mp3" type="audio/mpeg">
    </audio>
    <audio id="successSound">
        <source src="assets/audio/success.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
